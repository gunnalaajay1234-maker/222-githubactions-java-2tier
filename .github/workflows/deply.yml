name: Java CI Test + DB Connection

on:
  push:
    branches: ["main"]

jobs:
  build:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: employeedb
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      # ✅ Checkout
      - name: Checkout Code
        uses: actions/checkout@v3

      # ✅ Java Setup
      - name: Setup Java 17
        uses: actions/setup-java@v3
        with:
          distribution: 'temurin'
          java-version: '17'

      # ✅ Verify project structure
      - name: Show Repo
        run: ls -R

      # ✅ Build
      - name: Build Project
        run: |
          cd app
          mvn clean package -DskipTests

      # ✅ Check JAR
      - name: Verify JAR
        run: |
          ls -l app/target

      # ✅ Wait for PostgreSQL (CRITICAL FIX)
      - name: Wait for DB
        run: |
          echo "Waiting for PostgreSQL..."
          for i in {1..12}; do
            pg_isready -h postgres -p 5432 && break
            sleep 5
          done

      # ✅ Start Application with logs
      - name: Start Application
        run: |
          cd app
          nohup java -jar target/*.jar --debug > app.log 2>&1 &
          sleep 30

          echo "========= APP LOG ========="
          cat app.log || true

          echo "========= JAVA PROCESS ========="
          ps -ef | grep java || true

          echo "========= PORT CHECK ========="
          netstat -tulnp || true

      # ✅ Health Check (Retry)
      - name: Wait for App
        run: |
          for i in {1..12}; do
            echo "Attempt $i..."
            curl -f http://localhost:8080 && exit 0
            sleep 5
          done
          echo "App failed to start"
          exit 1

      # ✅ API TEST
      - name: Test POST API
        run: |
          curl -X POST http://localhost:8080/api/employees \
          -H "Content-Type: application/json" \
          -d '{"name":"Ajay","email":"ajay@test.com","department":"DevOps","salary":50000}'

      - name: Test GET API
        run: |
          curl http://localhost:8080/api/employees