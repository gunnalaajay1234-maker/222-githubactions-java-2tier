name: Java CI/CD with PostgreSQL

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: employee_db
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # 🔥 DEBUG STEP (don’t remove)
      - name: Show project structure
        run: |
          echo "===== ROOT ====="
          ls -la
          echo "===== APP ====="
          ls -la app || echo "NO APP FOLDER"

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      # ✅ CORRECT BUILD (THIS FIXES YOUR ERROR)
      - name: Build app
        working-directory: app
        run: mvn clean package -DskipTests

      - name: Wait for PostgreSQL
        run: |
          for i in {1..20}; do
            nc -z localhost 5432 && echo "DB Ready" && exit 0
            sleep 3
          done
          exit 1

      # ✅ RUN APP
      - name: Run Spring Boot App
        working-directory: app
        run: nohup java -jar target/*.jar > app.log 2>&1 &
        env:
          DB_HOST: localhost
          DB_NAME: employee_db
          DB_USER: postgres
          DB_PASSWORD: postgres

      - name: Show logs
        run: |
          sleep 20
          cat app/app.log

      - name: Health Check
        run: |
          for i in {1..20}; do
            curl -f http://localhost:8080 && exit 0
            sleep 5
          done
          exit 1