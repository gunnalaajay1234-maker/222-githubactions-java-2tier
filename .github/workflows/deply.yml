name: Java CI Test + DB Connection

on:
  push:
    branches: ["main"]

jobs:
  build:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: employeedb
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Show Structure
        run: ls -R

      - name: Setup Java
        uses: actions/setup-java@v3
        with:
          distribution: temurin
          java-version: 17

      # ✅ FIXED PATH
      - name: Build
        run: mvn clean package -DskipTests
        working-directory: ./app

      - name: Start App
        run: |
          nohup java -jar target/*.jar > app.log 2>&1 &
          sleep 20
        working-directory: ./app

      - name: Health Check
        run: curl -f http://localhost:8080

      - name: Test API
        run: |
          curl -X POST http://localhost:8080/api/employees \
          -H "Content-Type: application/json" \
          -d '{"name":"Ajay","email":"ajay@test.com","department":"DevOps","salary":50000}'

      - name: Get API
        run: curl http://localhost:8080/api/employees