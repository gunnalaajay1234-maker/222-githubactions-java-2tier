name: Java CI Test + DB Connection

on:
  push:
    branches: [ "main" ]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: employeedb
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:

      # ✅ Checkout
      - name: Checkout Code
        uses: actions/checkout@v3

      # ✅ Setup Java
      - name: Setup Java 17
        uses: actions/setup-java@v3
        with:
          distribution: 'temurin'
          java-version: '17'

      # ✅ Build (FIXED PATH)
      - name: Build with Maven
        run: mvn clean package -DskipTests
        working-directory: ./java

      # ✅ Start App (FIXED PATH)
      - name: Start Application
        run: |
          nohup java -jar java/target/*.jar > app.log 2>&1 &
          sleep 25

      # ✅ Wait for DB (stability improvement)
      - name: Wait for Postgres
        run: |
          for i in {1..10}; do
            nc -z localhost 5432 && echo "Postgres is up" && exit 0
            echo "Waiting for Postgres..."
            sleep 5
          done
          echo "Postgres failed to start"
          exit 1

      # ✅ Health Check
      - name: Check App Health
        run: |
          curl -f http://localhost:8080 || exit 1

      # ✅ API Test - POST
      - name: Test Create Employee API
        run: |
          curl -X POST http://localhost:8080/api/employees \
          -H "Content-Type: application/json" \
          -d '{"name":"Ajay","email":"ajay@test.com","department":"DevOps","salary":50000}'

      # ✅ API Test - GET
      - name: Test Get Employees API
        run: |
          curl http://localhost:8080/api/employees