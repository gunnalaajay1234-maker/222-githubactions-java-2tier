name: Java CI Test + DB Connection

on:
  push:
    branches: ["main"]

jobs:
  build:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: employeedb
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=10

    steps:
      # ✅ Checkout
      - name: Checkout Code
        uses: actions/checkout@v3

      # ✅ Java
      - name: Setup Java
        uses: actions/setup-java@v3
        with:
          distribution: temurin
          java-version: 17

      # ✅ Build
      - name: Build
        run: |
          cd app
          mvn clean package -DskipTests

      # ✅ Wait for DB
      - name: Wait for DB
        run: |
          for i in {1..20}; do
            nc -z 127.0.0.1 5432 && echo "DB Ready" && break
            echo "Waiting DB..."
            sleep 5
          done

      # ✅ Start App
      - name: Start App
        run: |
          cd app
          nohup java -jar target/*.jar > app.log 2>&1 &
          sleep 40

          echo "===== LOGS ====="
          cat app.log

      # ✅ CHECK PORT (IMPORTANT DEBUG)
      - name: Check Port
        run: |
          netstat -tulnp | grep 8080 || echo "PORT NOT OPEN"

      # ✅ Health Check
      - name: Health Check
        run: |
          for i in {1..15}; do
            echo "Attempt $i"
            curl -v http://127.0.0.1:8080 && exit 0
            sleep 5
          done
          echo "App failed"
          exit 1

      # ✅ TEST API
      - name: POST API
        run: |
          curl -X POST http://127.0.0.1:8080/api/employees \
          -H "Content-Type: application/json" \
          -d '{"name":"Ajay","email":"ajay@test.com","department":"DevOps","salary":50000}'

      - name: GET API
        run: |
          curl http://127.0.0.1:8080/api/employees