name: Java CI Test + DB Connection

on:
  push:
    branches: ["main"]

jobs:
  build:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: employeedb
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      # ✅ Checkout code
      - name: Checkout Code
        uses: actions/checkout@v3

      # ✅ Setup Java
      - name: Setup Java 17
        uses: actions/setup-java@v3
        with:
          distribution: 'temurin'
          java-version: '17'

      # ✅ Debug repo structure
      - name: Show Repo Structure
        run: ls -R

      # ✅ Build project (IMPORTANT: inside app folder)
      - name: Build Project
        run: |
          cd app
          mvn clean package -DskipTests

      # ✅ Verify JAR exists
      - name: Verify JAR
        run: |
          ls -l app/target

      # ✅ Wait for PostgreSQL (FIXED)
      - name: Wait for DB
        run: |
          echo "Waiting for PostgreSQL..."
          for i in {1..20}; do
            nc -z localhost 5432 && echo "DB Ready" && break
            echo "Waiting..."
            sleep 5
          done

      # ✅ Start Spring Boot App
      - name: Start Application
        run: |
          cd app
          nohup java -jar target/*.jar --debug > app.log 2>&1 &
          sleep 45

          echo "========= APP LOG ========="
          cat app.log || true

          echo "========= RUNNING JAVA ========="
          ps -ef | grep java || true

          echo "========= PORT STATUS ========="
          netstat -tulnp || true

      # ✅ Wait for App to Start
      - name: Wait for App
        run: |
          for i in {1..15}; do
            echo "Attempt $i..."
            curl -f http://localhost:8080 && exit 0
            sleep 5
          done
          echo "App failed to start"
          exit 1

      # ✅ Test POST API
      - name: Test POST API
        run: |
          curl -X POST http://localhost:8080/api/employees \
          -H "Content-Type: application/json" \
          -d '{"name":"Ajay","email":"ajay@test.com","department":"DevOps","salary":50000}'

      # ✅ Test GET API
      - name: Test GET API
        run: |
          curl http://localhost:8080/api/employees