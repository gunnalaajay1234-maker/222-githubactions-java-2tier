name: Java CI Test + DB Connection

on:
  push:
    branches: [ "main" ]
  pull_request:

jobs:
  build:   # ✅ JOB NAME (required)
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: employeedb
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:

      # ✅ Step 1: Checkout code
      - name: Checkout Code
        uses: actions/checkout@v3

      # ✅ Step 2: Setup Java
      - name: Setup Java 17
        uses: actions/setup-java@v3
        with:
          distribution: 'temurin'
          java-version: '17'

      # ✅ Step 3: Build project
      - name: Build with Maven
        run: mvn clean package -DskipTests

      # ✅ Step 4: Run Spring Boot App
      - name: Start Application
        run: |
          nohup java -jar target/*.jar > app.log 2>&1 &
          sleep 15

      # ✅ Step 5: Check App is Running
      - name: Check App Health
        run: |
          curl -f http://localhost:8080 || exit 1

      # ✅ Step 6: Test API (POST)
      - name: Test Create Employee API
        run: |
          curl -X POST http://localhost:8080/api/employees \
          -H "Content-Type: application/json" \
          -d '{"name":"Ajay","email":"ajay@test.com","department":"DevOps","salary":50000}'

      # ✅ Step 7: Test API (GET)
      - name: Test Get Employees API
        run: |
          curl http://localhost:8080/api/employees