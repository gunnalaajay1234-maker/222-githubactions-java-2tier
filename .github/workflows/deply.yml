name: Java CI

on:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: employeedb
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432

    steps:
      - uses: actions/checkout@v3

      - uses: actions/setup-java@v3
        with:
          java-version: 17
          distribution: temurin

      - name: Build
        run: mvn clean package -DskipTests
        working-directory: ./java

      - name: Run App
        run: |
          nohup java -jar java/target/*.jar &
          sleep 20

      - name: Test API
        run: curl http://localhost:8080/api/employees